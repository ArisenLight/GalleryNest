<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | GalleryNest</title>
  <link rel="stylesheet" href="public/css/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="auth-container">
    <h2>Create Your Account</h2>
    <form id="signup-form">
      <input type="text" id="name" placeholder="Your Name" required />
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit">Sign Up</button>
      <p class="auth-message" id="authMessage"></p>
    </form>
    <p class="switch-auth">
      Already have an account? <a href="login.html">Log in</a>
    </p>
  </div>

  <!-- Global Custom Modal -->
<div id="customAlertModal" class="modal">
  <div class="modal-content">
    <p id="customAlertMessage">Alert message goes here.</p>
    <button id="customAlertCloseBtn">Okay</button>
  </div>
</div>

  <script type="module" src="public/js/signup.js"></script>
  <script type="module" src="public\js\utils.js"></script>
</body>
</html>
